<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazfit Dashboard</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        margin-top: 50px;
        background: #111;
        color: #0f0;
      }
      .card {
        border: 1px solid #0f0;
        padding: 20px;
        margin: 20px auto;
        width: 200px;
        border-radius: 10px;
      }
      .value {
        font-size: 2em;
      }
    </style>
  </head>
  <body>
    <h1>Live Health Dashboard</h1>

    <div class="card">
      <h2>Heart Rate</h2>
      <div id="hr" class="value">--</div>
    </div>

    <div class="card">
      <h2>Steps</h2>
      <div id="steps" class="value">--</div>
    </div>

    <script>
      const ws = new WebSocket("ws://localhost:3000");

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.hr !== undefined) {
          document.getElementById("hr").textContent = data.hr;
        }

        if (data.steps !== undefined) {
          document.getElementById("steps").textContent = data.steps;
        }
      };

      document.body.insertAdjacentHTML("beforeend", '<div id="time"></div>')
      document.getElementById("time").textContent = 
      "Last updated @ " + new Date().toLocaleTimeString();
    </script>
  </body>
</html>
